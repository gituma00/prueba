<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inclusión Activa - Portal Accesible</title>
    
    <!-- Tailwind CSS para diseño fluido -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome para iconos premium de accesibilidad y juego -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* ==========================================
           HOJA DE ESTILOS CENTRALIZADA (CSS)
           ========================================== */

        /* Transiciones fluidas generales */
        .transition-all {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Enfoque de teclado altamente visible para navegación accesible */
        *:focus-visible {
            outline: 4px solid #1e293b !important;
            outline-offset: 3px;
        }

        /* Efecto sutil de pulsación para interactividad en botones */
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        .pulse-hover:hover {
            animation: pulse-soft 2s infinite ease-in-out;
        }

        /* ------------------------------------------
           MODO ALTO CONTRASTE (Para baja visión)
           ------------------------------------------ */
        body.high-contrast {
            background-color: #000000 !important;
            color: #ffffff !important;
        }
        body.high-contrast h1, 
        body.high-contrast h2, 
        body.high-contrast p,
        body.high-contrast span {
            color: #ffffff !important;
        }
        body.high-contrast button {
            background-color: #ffff00 !important;
            color: #000000 !important;
            border: 3px solid #ffffff !important;
        }
        body.high-contrast button * {
            color: #000000 !important;
        }
        body.high-contrast footer {
            background-color: #000000 !important;
            border-top: 2px solid #ffffff !important;
        }

        /* ------------------------------------------
           REGLA / GUÍA DE LECTURA VISUAL
           ------------------------------------------ */
        #reading-ruler {
            position: fixed;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: #2b9eb3;
            box-shadow: 0 0 8px rgba(43, 158, 179, 0.8);
            pointer-events: none;
            z-index: 9999;
            display: none;
        }
        body.high-contrast #reading-ruler {
            background-color: #ffff00;
            box-shadow: 0 0 8px #ffff00;
        }

        /* Resaltado para elementos leídos en voz alta */
        .reader-highlight {
            outline: 3px dashed #1e293b !important;
            outline-offset: 4px;
            cursor: pointer;
        }
        body.high-contrast .reader-highlight {
            outline: 3px dashed #ffff00 !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-full flex flex-col justify-between transition-colors duration-300">

    <!-- Barra Superior de Herramientas de Accesibilidad -->
    <header class="w-full bg-slate-900 text-white py-3 px-4 shadow-md border-b border-slate-800" role="toolbar" aria-label="Herramientas de accesibilidad">
        <div class="max-w-7xl mx-auto flex flex-wrap justify-between items-center gap-3">
            <span class="text-xs font-semibold uppercase tracking-wider text-slate-400 flex items-center gap-2">
                <i class="fa-solid fa-sliders"></i> Accesibilidad
            </span>
            <div class="flex flex-wrap items-center gap-2">
                <!-- Ajustes del tamaño de la fuente -->
                <button onclick="changeFontSize(1)" class="bg-slate-800 hover:bg-slate-700 text-xs px-3 py-1.5 rounded-lg font-bold flex items-center gap-1 transition-all" aria-label="Aumentar tamaño de letra">
                    A<span class="text-[10px]">+</span>
                </button>
                <button onclick="changeFontSize(-1)" class="bg-slate-800 hover:bg-slate-700 text-xs px-3 py-1.5 rounded-lg font-bold flex items-center gap-1 transition-all" aria-label="Disminuir tamaño de letra">
                    A<span class="text-[10px]">-</span>
                </button>
                
                <!-- Interruptor de Contraste -->
                <button onclick="toggleContrast()" class="bg-slate-800 hover:bg-slate-700 text-xs px-3 py-1.5 rounded-lg font-medium flex items-center gap-1.5 transition-all" aria-label="Cambiar contraste de pantalla">
                    <i class="fa-solid fa-circle-half-stroke"></i> Contraste
                </button>

                <!-- Interruptor de la Guía de Lectura -->
                <button onclick="toggleReadingRuler()" id="ruler-btn" class="bg-slate-800 hover:bg-slate-700 text-xs px-3 py-1.5 rounded-lg font-medium flex items-center gap-1.5 transition-all" aria-label="Activar regla de lectura para guiar la vista">
                    <i class="fa-solid fa-grip-lines"></i> Regla de Vista
                </button>

                <!-- Lector de Asistencia por Voz -->
                <button onclick="toggleSpeechReader()" id="speech-btn" class="bg-slate-800 hover:bg-slate-700 text-xs px-3 py-1.5 rounded-lg font-medium flex items-center gap-1.5 transition-all" aria-label="Activar lector de asistencia por voz">
                    <i class="fa-solid fa-volume-high"></i> Lector de Voz
                </button>

                <!-- Restablecer opciones -->
                <button onclick="resetAccessibility()" class="bg-red-950/40 text-red-200 border border-red-900/40 hover:bg-red-900/40 text-xs px-3 py-1.5 rounded-lg font-medium flex items-center gap-1 transition-all" aria-label="Restablecer ajustes de accesibilidad">
                    <i class="fa-solid fa-rotate-left"></i> Restablecer
                </button>
            </div>
        </div>
    </header>

    <!-- Regla física para guiar la vista -->
    <div id="reading-ruler"></div>

    <!-- Contenedor Principal (Cuerpo de la Página) -->
    <main class="flex-grow flex items-center justify-center px-4 py-8 w-full">
        <div class="max-w-4xl w-full mx-auto text-center">
            
            <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight mb-8">
                Inclusión Activa
            </h1>

            <!-- Grid responsivo optimizado para móviles (centrado, botones compactos) -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-xs md:max-w-3xl mx-auto items-center justify-center">
                
                <!-- Botón 1: Discapacidad -->
                <button class="pulse-hover group transition-all duration-300 flex flex-col md:flex-row items-center justify-center md:justify-between p-4 md:p-8 rounded-2xl shadow-md hover:shadow-lg text-center md:text-left text-slate-900 font-medium w-full" 
                        style="background-color: #edf79e;"
                        aria-label="Sección de Información sobre Discapacidad">
                    <div class="flex flex-col md:flex-row items-center gap-3 md:gap-5">
                        <!-- Icono adaptado para smartphones (más pequeño) y desktops -->
                        <div class="w-12 h-12 md:w-16 md:h-16 rounded-xl bg-slate-950/10 flex items-center justify-center text-2xl md:text-3xl shrink-0 group-hover:scale-110 transition-transform text-slate-800">
                            <i class="fa-solid fa-universal-access"></i>
                        </div>
                        <div>
                            <h2 class="text-lg md:text-xl font-bold tracking-tight text-slate-900">Discapacidad</h2>
                            <p class="text-slate-700 text-[11px] md:text-xs mt-0.5 md:mt-1">Información y concienciación sobre accesibilidad.</p>
                        </div>
                    </div>
                    <!-- Flecha oculta en móvil para simplificar, visible en desktop -->
                    <div class="hidden md:flex w-10 h-10 rounded-full bg-slate-950/10 group-hover:bg-slate-950/20 items-center justify-center shrink-0 text-slate-800">
                        <i class="fa-solid fa-arrow-right transition-transform group-hover:translate-x-1"></i>
                    </div>
                </button>

                <!-- Botón 2: Juegos -->
                <button class="pulse-hover group transition-all duration-300 flex flex-col md:flex-row items-center justify-center md:justify-between p-4 md:p-8 rounded-2xl shadow-md hover:shadow-lg text-center md:text-left text-slate-900 font-medium w-full" 
                        style="background-color: #edf79e;"
                        aria-label="Sección de Juegos Interactivos">
                    <div class="flex flex-col md:flex-row items-center gap-3 md:gap-5">
                        <!-- Icono adaptado para smartphones (más pequeño) y desktops -->
                        <div class="w-12 h-12 md:w-16 md:h-16 rounded-xl bg-slate-950/10 flex items-center justify-center text-2xl md:text-3xl shrink-0 group-hover:scale-110 transition-transform text-slate-800">
                            <i class="fa-solid fa-gamepad"></i>
                        </div>
                        <div>
                            <h2 class="text-lg md:text-xl font-bold tracking-tight text-slate-900">Juegos</h2>
                            <p class="text-slate-700 text-[11px] md:text-xs mt-0.5 md:mt-1">Experiencias y desafíos adaptados para todos.</p>
                        </div>
                    </div>
                    <!-- Flecha oculta en móvil para simplificar, visible en desktop -->
                    <div class="hidden md:flex w-10 h-10 rounded-full bg-slate-950/10 group-hover:bg-slate-950/20 items-center justify-center shrink-0 text-slate-800">
                        <i class="fa-solid fa-arrow-right transition-transform group-hover:translate-x-1"></i>
                    </div>
                </button>

            </div>
        </div>
    </main>

    <!-- Pie de página (Footer) -->
    <footer class="bg-slate-900 text-slate-400 py-8 border-t border-slate-800 text-xs md:text-sm">
        <div class="max-w-7xl mx-auto px-4 flex flex-col sm:flex-row justify-between items-center gap-4 text-center sm:text-left">
            <div>
                <p class="font-bold text-white text-base flex items-center gap-2 justify-center sm:justify-start">
                    <span class="inline-block w-3 h-3 rounded-full" style="background-color: #edf79e;"></span>
                    Inclusión Activa
                </p>
                <p class="mt-1 text-slate-400">Diseñado con propósitos informativos, educativos y de entretenimiento accesible en la web.</p>
            </div>
            <div class="text-slate-500">
                <p>&copy; 2026. Todos los derechos reservados.</p>
            </div>
        </div>
    </footer>

    <script>
        let currentFontScale = 100; // Porcentaje base de letra
        const body = document.body;
        const ruler = document.getElementById('reading-ruler');
        let rulerActive = false;
        let speechReaderActive = false;
        let speechUtterance = null;

        // Ajuste interactivo del tamaño de letra global
        function changeFontSize(direction) {
            currentFontScale += (direction * 10);
            if (currentFontScale < 70) currentFontScale = 70;
            if (currentFontScale > 160) currentFontScale = 160;
            document.documentElement.style.fontSize = `${currentFontScale}%`;
        }

        // Activación del Modo de Alto Contraste
        function toggleContrast() {
            body.classList.toggle('high-contrast');
        }

        // Activación de la Regla / Guía de Lectura
        function toggleReadingRuler() {
            rulerActive = !rulerActive;
            const btn = document.getElementById('ruler-btn');
            if (rulerActive) {
                ruler.style.display = 'block';
                btn.classList.add('bg-teal-700', 'text-white');
                btn.classList.remove('bg-slate-800');
            } else {
                ruler.style.display = 'none';
                btn.classList.remove('bg-teal-700');
                btn.classList.add('bg-slate-800');
            }
        }

        // Activador del Lector de Asistencia Vocálica
        function toggleSpeechReader() {
            speechReaderActive = !speechReaderActive;
            const btn = document.getElementById('speech-btn');
            
            if (speechReaderActive) {
                btn.classList.add('bg-teal-700', 'text-white');
                btn.classList.remove('bg-slate-800');
                speakText("Lector de asistencia activado. Pase el cursor o enfoque cualquier elemento para escucharlo.");
                setupSpeechEvents();
            } else {
                btn.classList.remove('bg-teal-700');
                btn.classList.add('bg-slate-800');
                if (window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                }
                removeSpeechEvents();
            }
        }

        // Sintetizador nativo de Texto a Voz (Speech Synthesis API)
        function speakText(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel(); // Interrumpe cualquier locución activa previa
            if (!text) return;
            
            speechUtterance = new SpeechSynthesisUtterance(text);
            speechUtterance.lang = 'es-ES';
            window.speechSynthesis.speak(speechUtterance);
        }

        // Controlador de enfoque para lectura por voz
        function handleSpeechHover(e) {
            if (!speechReaderActive) return;
            e.stopPropagation();
            
            const target = e.currentTarget;
            target.classList.add('reader-highlight');
            
            // Prioriza etiquetas descriptivas de accesibilidad (aria-label) antes que textos internos
            let textToRead = target.getAttribute('aria-label') || target.innerText || target.textContent;
            speakText(textToRead);
        }

        // Evento al quitar el cursor del elemento focalizado
        function handleSpeechLeave(e) {
            const target = e.currentTarget;
            target.classList.remove('reader-highlight');
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
            }
        }

        // Vincular los eventos interactivos de locución de texto
        function setupSpeechEvents() {
            const elements = document.querySelectorAll('h1, h2, p, button, span');
            elements.forEach(el => {
                // Previene lectura redundante de la propia barra superior
                if (!el.closest('header')) {
                    el.addEventListener('mouseenter', handleSpeechHover);
                    el.addEventListener('mouseleave', handleSpeechLeave);
                    el.addEventListener('focus', handleSpeechHover);
                    el.addEventListener('blur', handleSpeechLeave);
                }
            });
        }

        // Desvincular eventos interactivos de voz
        function removeSpeechEvents() {
            const elements = document.querySelectorAll('h1, h2, p, button, span');
            elements.forEach(el => {
                el.removeEventListener('mouseenter', handleSpeechHover);
                el.removeEventListener('mouseleave', handleSpeechLeave);
                el.removeEventListener('focus', handleSpeechHover);
                el.removeEventListener('blur', handleSpeechLeave);
                el.classList.remove('reader-highlight');
            });
        }

        // Vincular movimiento físico de la regla de guía visual
        window.addEventListener('mousemove', (e) => {
            if (rulerActive) {
                ruler.style.top = `${e.clientY}px`;
            }
        });

        // Soporte táctil móvil para mover la regla visual
        window.addEventListener('touchmove', (e) => {
            if (rulerActive && e.touches.length > 0) {
                ruler.style.top = `${e.touches[0].clientY}px`;
            }
        });

        // Restablecer todas las configuraciones globales
        function resetAccessibility() {
            currentFontScale = 100;
            document.documentElement.style.fontSize = '100%';
            body.classList.remove('high-contrast');
            
            // Apagar la regla si está activa
            rulerActive = true; 
            toggleReadingRuler(); 
            
            // Detener el lector de voz
            if (speechReaderActive) {
                toggleSpeechReader();
            }
        }
    </script>
</body>
</html>
